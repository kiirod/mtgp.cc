<!DOCTYPE html>
<html lang="en">
<head>
  <noscript>
  <meta http-equiv="refresh" content="0; url=/javascript">
</noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkeytype Projects</title>

    <link rel="icon" type="image/png" href="https://cdn.mtgoals.cc/images/mtp2.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #313338;
            --btn-bg: #3a3d42;
            --accent: #e2b714;
            --discord-blurple: #e2b714;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 80px;
            margin-left: 10px;
        }

        header svg {
            width: 50px;
            height: 50px;
            fill: var(--accent);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-left: 0.5px;
            width: 450px;
        }

        .toggle-btn {
            cursor: pointer;
            background: none;
            border: none;
            color: var(--accent);
            font-family: 'Roboto Mono', monospace;
            font-size: 1.2rem;
            text-align: left;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--btn-bg);
            border: 3px solid var(--accent);
            color: var(--accent);
            padding: 20px 30px;
            text-decoration: none;
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn:hover {
            opacity: 0.8;
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .right-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 40px;
            margin-top: 50px;
        }

        .discord-big {
            width: 400px;
            height: 350px;
            padding: 30px;
            background: transparent;
            border: 4px solid var(--text-white);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .discord-big:hover {
            background-color: var(--discord-blurple);
            border-color: var(--discord-blurple);
        }

        .discord-big svg {
            width: 100%;
            height: 100%;
            fill: var(--text-white);
        }

        .credit {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        .strip-1 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ff0000;
            color: #ffffff;
            z-index: 9999;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-decoration: none;
            font-weight: bold;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .strip-1.visible {
            display: block !important;
        }

        .strip-2 {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        .strip-3 {
            display: inline-block;
            padding-right: 50px;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        body.strip-active {
            padding-top: 75px;
        }
    </style>
</head>
<body>

    <header>

    <script>

            { name: "Monkeytype Goals", url: "https://pj.mtgoals.cc/home/app/mtg" },
            { name: "Monkeytype Themes", url: "https://pj.mtgoals.cc/home/app/mthemes" },
            { name: "Monkeytype Namecheck", url: "https://pj.mtgoals.cc/home/app/mnc/" },
            { name: "Monkeypost", url: "https://pj.mtgoals.cc/home/app/mtpost" },
            { name: "mtype", url: "https://pj.mtgoals.cc/home/app/mtype" },
            { name: "Monkeyclicker", url: "https://pj.mtgoals.cc/home/app/clicker" }
        ];

        ];

        let isSet1 = true;

        function renderButtons() {
            const container = document.getElementById('button-container');
            const toggle = document.getElementById('toggle');
            container.innerHTML = '';
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            const activeSet = isSet1 ? set1 : set2;
            toggle.innerText = isSet1 ? "1/2" : "2/2";

            activeSet.forEach(item => {
                const a = document.createElement('a');
                a.className = 'btn';
                a.href = item.url;
                a.innerHTML = (item.svg || '') + item.name;
                container.appendChild(a);
            });
        }

        function toggleButtons() {
            isSet1 = !isSet1;
            renderButtons();
        }

        function checkUserLocation() {
            try {
                const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const isUKTimezone = userTimezone === 'Europe/London' || userTimezone === 'Europe/Belfast';
                const isUKLocale = navigator.languages
                    ? navigator.languages.some(l => l === 'en-GB')
                    : navigator.language === 'en-GB';

                if (isUKTimezone || isUKLocale) {
                    document.getElementById('strip-id').classList.add('visible');
                    document.body.classList.add('strip-active');
                }
            } catch (e) {
                console.warn("Location detection failed. Defaulting to safe state.", e);
            }
        }

        renderButtons();
        checkUserLocation();
    </script>
