<!DOCTYPE html>
<html lang="en">
<head>
<noscript>
<meta http-equiv="refresh" content="0; url=/javascript">
</noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkeytype Projects - JavaScript Required</title>

    <link rel="icon" type="image/png" href="https://cdn.mtgoals.cc/images/mtp2.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #313338;
            --btn-bg: #3a3d42;
            --accent: #e2b714;
            --discord-blurple: #5865F2;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-white);
        }

        a {
            color: var(--accent);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>JavaScript Required</h1>
        <p>This site needs JavaScript to function properly.</p>
        <p>Please enable JavaScript or return to <a href="/">home</a>.</p>
    </div>
</body>
</html>
